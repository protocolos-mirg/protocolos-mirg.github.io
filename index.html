<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--primary:#0F1F33;--blue:#1B3A5C;--teal:#065A82;--accent:#2874A6;--uro:#6C3483;--red:#C0392B;--amber:#D4872E;--green:#2E7D32;--onco:#CB4335;--text:#1a2a3a;--textL:#5a6b7c;--bg:#f2f5f8;--card:#fff;--border:#e8ecf0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Helvetica Neue',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;padding-bottom:env(safe-area-inset-bottom)}
.header{padding:calc(env(safe-area-inset-top,20px) + 16px) 16px 20px;text-align:center;color:#fff}
.header-home{background:linear-gradient(135deg,#0F1F33,#1B3A5C)}
.header small{display:block;font-size:11px;font-weight:600;letter-spacing:1px;opacity:.55;margin-bottom:4px}
.header h1{font-size:22px;font-weight:800}
.header p{font-size:13px;opacity:.7;margin-top:2px}
.search{padding:12px 16px 8px;max-width:700px;margin:0 auto}
.search input{width:100%;padding:12px 16px;border-radius:12px;border:1px solid var(--border);font-size:14px;background:#fff;box-shadow:0 2px 6px rgba(0,0,0,.04);outline:none}
.search input:focus{border-color:var(--accent);box-shadow:0 2px 10px rgba(40,116,166,.15)}
.list{padding:4px 16px 24px;max-width:700px;margin:0 auto}
.proto-card{width:100%;display:flex;align-items:center;gap:14px;padding:16px;background:#fff;border:1px solid var(--border);border-radius:14px;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.05);margin-bottom:10px;text-align:left;transition:transform .15s,box-shadow .15s}
.proto-card:active{transform:scale(.98)}
.proto-icon{width:52px;height:52px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
.proto-card .title{font-weight:700;font-size:15px;color:var(--text);margin-bottom:2px}
.proto-card .sub{font-size:12px;color:var(--textL)}
.proto-card .arrow{color:#ccc;font-size:18px;margin-left:auto}
.back-btn{background:rgba(0,0,0,.45);border:1px solid rgba(255,255,255,.6);color:#fff;padding:7px 16px;border-radius:20px;font-size:13px;cursor:pointer;font-weight:700;margin-bottom:10px;text-shadow:0 1px 3px rgba(0,0,0,.5);backdrop-filter:blur(4px)}
.back-btn:active{opacity:.7}
.detail-header{padding:calc(env(safe-area-inset-top,20px) + 12px) 16px 22px;color:#fff}
.detail-header .icon{font-size:30px;margin-bottom:4px}
.detail-header h1{font-size:20px;font-weight:700}
.detail-header p{font-size:12px;opacity:.8;margin-top:2px}
.sections{padding:14px 16px 30px;max-width:700px;margin:0 auto}
.section{background:#fff;border-radius:12px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,.06);border:1px solid var(--border);overflow:hidden}
.section-head{width:100%;display:flex;align-items:center;justify-content:space-between;padding:13px 14px;border:none;background:transparent;cursor:pointer;text-align:left}
.section-head.open{background:#f0f4f8}
.section-head .left{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.section-head .ico{font-size:18px}
.section-head .ttl{font-weight:700;font-size:14px;color:var(--text)}
.tag{display:inline-block;padding:2px 8px;border-radius:4px;color:#fff;font-size:10px;font-weight:700;letter-spacing:.3px;margin-left:6px;vertical-align:middle}
.chevron{font-size:14px;color:#aaa;transition:transform .2s;flex-shrink:0}
.chevron.open{transform:rotate(180deg)}
.section-body{padding:6px 12px 12px}
.item-row{display:flex;justify-content:space-between;align-items:flex-start;padding:9px 12px;background:#fafbfc;border-radius:8px;margin-bottom:5px;gap:10px}
.item-row .lbl{flex:0 0 auto;max-width:48%;font-weight:600;font-size:12.5px;color:var(--text)}
.item-row .val{flex:1;text-align:right;font-size:12.5px;color:var(--accent);font-weight:500}
.item-row .note{font-size:10.5px;color:#999;font-weight:400;margin-top:2px}
.sub-title{font-size:12px;font-weight:700;color:var(--accent);padding:6px 0 4px;border-bottom:1px solid var(--border);margin-bottom:5px;margin-top:6px}
.note-box{background:#FFF8E1;border-left:4px solid #F0AD4E;padding:9px 12px;border-radius:0 6px 6px 0;font-size:12px;color:#6D5200;margin-top:6px;line-height:1.5}
.footer{text-align:center;padding:10px 16px 20px;font-size:11px;color:#aaa}
.empty{text-align:center;padding:40px 0;color:#999;font-size:14px}
.cat-header{display:flex;align-items:center;gap:8px;padding:6px 4px 8px;margin-top:16px;margin-bottom:2px}
.cat-header:first-child{margin-top:8px}
.cat-icon{font-size:16px}
.cat-label{font-size:12px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;color:var(--textL)}
.pinned-banner{background:#FFF3E0;border:2px solid #E65100;border-radius:12px;padding:14px 16px;margin:0 16px 14px;max-width:668px;margin-left:auto;margin-right:auto;box-shadow:0 2px 10px rgba(230,81,0,.15);position:sticky;top:0;z-index:10}
.pinned-banner .pinned-title{display:flex;align-items:center;gap:8px;font-weight:800;font-size:14px;color:#BF360C;margin-bottom:6px}
.pinned-banner .pinned-note{background:#FFF8E1;border-left:3px solid #E65100;padding:6px 10px;border-radius:0 6px 6px 0;font-size:12.5px;color:#4E2600;margin-top:5px;line-height:1.5;font-weight:600}
.pinned-banner .pinned-item{background:#FFF8E1;border-left:3px solid #E65100;padding:8px 10px;border-radius:0 6px 6px 0;margin-top:6px;line-height:1.5}
.pinned-banner .pinned-item-label{font-size:12.5px;font-weight:700;color:#BF360C;margin-bottom:2px}
.pinned-banner .pinned-item-value{font-size:12px;color:#4E2600}
.service-badges{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;justify-content:center}
.badge{padding:3px 10px;border-radius:4px;color:#fff;font-size:10px;font-weight:700;letter-spacing:.3px}
@media(min-width:600px){.item-row{padding:10px 14px}.section-head{padding:14px 16px}}
.rockwood-scale{padding:8px 0}
.rw-row{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;margin-bottom:4px;transition:background .15s}
.rw-row:nth-child(odd){background:#fafbfc}
.rw-num{width:30px;height:30px;border-radius:50%;color:#fff;font-weight:800;font-size:14px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.rw-bar{width:4px;height:34px;border-radius:2px;flex-shrink:0}
.rw-info{flex:1;min-width:0}
.rw-name{font-weight:700;font-size:12.5px;color:var(--text)}
.rw-desc{font-size:11px;color:var(--textL);line-height:1.4;margin-top:1px}
.rw-meter{width:60px;height:8px;background:#e0e0e0;border-radius:4px;overflow:hidden;flex-shrink:0}
.rw-meter-fill{height:100%;border-radius:4px}
.rw-legend{display:flex;gap:6px;flex-wrap:wrap;margin-top:10px;padding:8px 10px;background:#EBF5FB;border-radius:8px;border-left:4px solid #2980B9}
.rw-legend span{font-size:11px;font-weight:600;color:#1A5276}
.rw-cutoff{background:#FFF3E0;border:2px dashed #E65100;border-radius:8px;padding:8px 12px;margin:8px 0;text-align:center;font-size:12px;font-weight:700;color:#BF360C}
</style>
</head>

id:"trasladointer",title:"Traslado Intercentros",icon:"🚑",color:"#065A82",cat:"gestion",
subtitle:"PNT traslados CB/C3 → LP — Versión 3 (ene 2026)",
sections:[
{title:"Lo que todo adjunto de MIRG debe saber",icon:"🎯",pinned:true,items:[
{l:"Dirección SIEMPRE",v:"CB/C3 (origen) → LP (destino). El adjunto del hospital de origen inicia y coordina el traslado."},
{l:"¿Estoy designado hoy para atender traslados en caso necesario?",v:"Consúltalo cada día en el fichero compartido de Hospitalización (columna GSSU & Presálida). Lo asigna el JS cada mañana."},
{l:"¿Cuándo me pueden avisar?",v:"Te pueden avisar por un paciente inestable trasladado desde CB o C3 que está en zona de Presálida, GSSU o URPA."}
],
notes:["Versión 3 — 12 enero 2026. Elaborado por Dirección Médica, Enfermería, Gestión y Admisión."]
},
{title:"¿Quién me avisa y cómo?",icon:"📞",tag:"CLAVE MIRG",tagC:"#065A82",
items:[
{l:"Por la mañana (L-V 8–15h)",v:"Te avisará, por este orden: 1) JS (441989) → 2) AQ (857455) → 3) JJR (874840) → 4) Secretaría (447126)"},
{l:"Durante la guardia (resto horario)",v:"FEA de guardia (859491) / Residente mayor de guardia (853402)"},
{l:"¿En qué situaciones me llaman?",v:"Inestabilización del paciente durante prueba, en URPA, o cuando el paciente llega a GSSU Sala 6 tras traslado no programado"}
],
notes:["En los traslados programados (5.1 y 5.2): el paciente de MIRG sigue siendo responsabilidad del adjunto designado o del FEA de guardia hasta que vuelva a CB/C3. Presálida o URPA llamarán si hay inestabilización."]
},
{title:"Responsabilidades por rol",icon:"👥",
subs:[
{title:"Facultativo del hospital de origen (CB/C3)",items:[
{l:"Valoración",v:"Valora la necesidad de traslado y el tipo de circuito (5.1/5.2/5.3)"},
{l:"Aviso",v:"Avisa al referente de su servicio o al FEA de guardia en LP (Castellana)"},
{l:"Ambulancia",v:"Solicita ambulancia a Gestión de Camas (851566 / 441567)"}
]},
{title:"Enfermería de planta (CB/C3)",items:[
{l:"Preparación",v:"Documentación clínica, medicación y pertenencias del paciente"},
{l:"Informe",v:"Informe de continuidad de cuidados de enfermería"},
{l:"HCIS",v:"Traslada al paciente en HCIS a 'TRÁNSITO' reservando cama en CB/C3"}
]},
{title:"Gestión de Camas y Admisión",items:[
{l:"HCIS",v:"Gestiona el traslado en HCIS y asigna cama en LP"},
{l:"SUMMA",v:"Valida el transporte sanitario en aplicativo SUMMA 112"},
{l:"Teléfonos",v:"L-V 8–21h: 441567 / 851566 / 856800 | Noches y festivos: Supervisor guardia 851121"}
]},
{title:"Enfermera de GSSU (Sala 6)",items:[
{l:"Aviso",v:"Llama al adjunto designado o FEA de guardia de MIRG cuando llega el paciente"},
{l:"Urgencia imprevista",v:"Si complicación urgente no prevista, avisa también al referente de Urgencias"}
]},
{title:"Médico de MIRG en LP (adjunto designado o FEA de guardia)",items:[
{l:"Recepción",v:"Recibe y supervisa al paciente en LP cuando llega a GSSU Sala 6"},
{l:"Decisión",v:"Decide ingreso en LP, retorno a CB/C3 o escalada (UCI, especialista)"},
{l:"Interconsultas",v:"Gestiona las interconsultas necesarias en LP"}
]}
]
},
{title:"5.1 Prueba/Consulta sin sedación (programado)",icon:"📋",tag:"PROGRAMADO",tagC:"#2E7D32",
items:[
{l:"Definición",v:"Paciente en CB/C3 que necesita prueba o consulta en LP SIN sedación ni intervencionismo (TAC, eco, consulta de especialidad…). El paciente VUELVE a CB/C3 el mismo día."},
{l:"Ubicación en LP",v:"Zona de PRESÁLIDA / TRÁNSITO (Castellana). No ingresa en planta."},
{l:"Paso 1",v:"Adjunto de MI en CB/C3 solicita la prueba/consulta e informa a enfermería"},
{l:"Paso 2",v:"Enfermería de CB/C3 solicita ambulancia programada a Gestión de Camas (851566 / 441567)"},
{l:"Paso 3",v:"Celador de CB/C3 acompaña al paciente con HC e informe de enfermería hasta la ambulancia"},
{l:"Paso 4",v:"Paciente llega a LP → Presálida/Tránsito → celador lo lleva a consulta/sala de prueba"},
{l:"Paso 5",v:"Tras la prueba: administrativa del servicio cierra ambulancia de vuelta. Celador lleva a Presálida → ambulancia → retorno a CB/C3"}
],
notes:["⚠ INESTABILIZACIÓN EN LP: Se avisa INMEDIATAMENTE al adjunto designado de MIRG ese día (fichero compartido Hospitalización). Horario laboral → cadena JS (441989) → AQ (857455) → JJR (874840) → Secretaría (447126). Guardia → FEA (859491) / Residente mayor (853402). El paciente permanece SIEMPRE supervisado en el lugar del procedimiento hasta la llegada del médico.","Trazabilidad HCIS: enfermera de CB/C3 traslada al paciente a pestaña 'TRÁNSITO' reservando cama en CB/C3, asignando GFH del servicio origen en Castellana."]
},
{title:"5.2 Sedación / Intervencionismo (programado)",icon:"💉",tag:"PROGRAMADO",tagC:"#D4872E",
items:[
{l:"Definición",v:"Paciente en CB/C3 que requiere prueba con sedación o intervencionismo en LP (endoscopia, broncoscopia, biopsia guiada, drenaje…). Ambulancia ida Y vuelta gestionada por el facultativo."},
{l:"Paso 1",v:"Adjunto en CB/C3 solicita la prueba. Administrativo tramita ambulancia ida y vuelta (TSNU/SUMMA)"},
{l:"Paso 2",v:"Ambulancia CB/C3 → Presálida/Tránsito LP. Celador recoge y lleva a la sala de prueba (pulsera + cita obligatorias)"},
{l:"Paso 3",v:"Tras la prueba → paciente a URPA. El especialista/anestesista valora estabilidad antes del alta de URPA"},
{l:"Paso 4",v:"Cuando estable → administrativa cierra ambulancia de vuelta → celador lleva a Presálida → retorno a CB/C3"},
{l:"Recorrido en LP",v:"PRESÁLIDA → SALA DE PRUEBA → URPA → PRESÁLIDA → ambulancia a CB/C3"}
],
notes:["⚠ INESTABILIZACIÓN (durante prueba o en URPA): El especialista/anestesista es responsable en su área. Si se inestabiliza, llama INMEDIATAMENTE al adjunto designado de MIRG. Horario laboral → cadena JS (441989) → AQ (857455) → JJR (874840) → Secretaría (447126). Guardia → FEA (859491) / Residente mayor (853402).","Trazabilidad HCIS: origen traslada a 'TRÁNSITO' reservando cama en CB/C3. Al llegar a URPA → traslado a localización URPA. Al salir de URPA → vuelve a 'TRÁNSITO' hasta retorno a CB/C3."]
},
{title:"5.3 Deterioro clínico — Sin criterios BOX REA",icon:"🚑",tag:"URGENTE",tagC:"#C0392B",
items:[
{l:"Definición",v:"Paciente en CB/C3 que se deteriora y necesita atención urgente no disponible en origen. Destino: GSSU – SALA 6 (hospitalización en Urgencias LP). Si Sala 6 no disponible → Sala 5 (UPAMI)."},
{l:"⚠ Clave MIRG",v:"Llamar SIEMPRE a Gestión de Camas (851566). NUNCA enviar al paciente directamente a Urgencias de LP sin coordinación previa."},
{l:"Paso 1",v:"Adjunto de CB/C3 llama a Gestión de Camas (851566 / 441567) para gestionar cama en GSSU. También avisa al referente de su servicio en LP o al FEA de guardia."},
{l:"Paso 2",v:"Traslado interno HCIS: servicio origen → Unidad GSSU (a cargo del servicio origen en LP)"},
{l:"Paso 3",v:"Ambulancia urgente CB/C3 → Urgencias LP. Admisión de Urgencias identifica al paciente."},
{l:"Paso 4",v:"Celador traslada a cama en GSSU Sala 6"},
{l:"Paso 5",v:"Enfermera de GSSU llama al adjunto designado de MIRG (o FEA de guardia) → responsable de la atención"},
{l:"Códigos especiales",v:"Código ictus, TEP, infarto, proceso cardiológico agudo, sepsis/UVI, TCE con Glasgow <13 → circuitos específicos de cada código"}
],
subs:[
{title:"Gestión de Camas — Teléfonos",items:[
{l:"L-V 08:00–21:00",v:"441567 / 851566 / 856800"},
{l:"L-V 21:00–08:00",v:"Supervisor de guardia: 851121"},
{l:"Fines semana/festivos 08:00–20:00",v:"441567 / 851566 / 856800"},
{l:"Fines semana/festivos 20:00–08:00",v:"Supervisor de guardia: 851121"}
]}
]
},
{title:"5.3b Caída o accidente en CB/C3",icon:"⚠️",tag:"URGENTE",tagC:"#D4872E",
items:[
{l:"Definición",v:"Paciente en CB/C3 que sufre caída o accidente y puede necesitar atención en Urgencias LP (traumatismo, fractura, TCE). El adjunto de MI SIEMPRE valora antes de decidir traslado."},
{l:"Paso 1",v:"Enfermería comunica la caída/accidente al adjunto de MI en CB/C3"},
{l:"Paso 2",v:"Adjunto de MI valora al paciente y decide si necesita traslado"},
{l:"Paso 3",v:"Si procede → solicita ambulancia a Gestión de Camas (851566 / 441567) indicando el motivo"},
{l:"Paso 4",v:"Paciente con informe clínico + informe enfermería → Urgencias LP → Box 4"},
{l:"Paso 5",v:"La cama en CB/C3 se mantiene reservada hasta resolución en LP"},
{l:"Tras Box 4",v:"Si no ingresa en LP → traslada a Sala 6 en espera de ambulancia de vuelta a CB/C3"}
],
notes:["Las caídas son frecuentes en nuestros pacientes mayores en CB/C3. El adjunto SIEMPRE valora antes de pedir traslado. No pedir traslado rutinario por caída sin valoración previa."]
},

// ============ RENDER ENGINE ============
const $=id=>document.getElementById(id);
const app=$('app');
let openSections={};

function h(tag,attrs,...children){
const el=document.createElement(tag);
if(attrs)Object.entries(attrs).forEach(([k,v])=>{
if(k==='onclick')el.addEventListener('click',v);
else if(k==='class')el.className=v;
else if(k==='style'&&typeof v==='object')Object.assign(el.style,v);
else if(k==='html')el.innerHTML=v;
else el.setAttribute(k,v);
});
children.flat().forEach(c=>{if(c)el.appendChild(typeof c==='string'?document.createTextNode(c):c)});
return el;
}

function renderHome(filter=''){
const fl=filter.toLowerCase();
const filtered=protocols.filter(p=>{
if(!fl)return true;
if(p.title.toLowerCase().includes(fl)||p.subtitle.toLowerCase().includes(fl))return true;
return p.sections.some(s=>
s.title.toLowerCase().includes(fl)||
(s.items&&s.items.some(i=>(i.l+i.v).toLowerCase().includes(fl)))||
(s.notes&&s.notes.some(n=>n.toLowerCase().includes(fl)))
);
});
app.innerHTML='';
// Header
const hdr=h('div',{class:'header header-home'},
h('small',null,'MEDICINA INTERNA'),
h('h1',null,'Protocolos MIRG'),
h('p',null,'Guía rápida del servicio')
);
app.appendChild(hdr);
// Search
const searchDiv=h('div',{class:'search'});
const inp=h('input',{type:'text',placeholder:'Buscar protocolo o medicación...',value:filter});
inp.addEventListener('input',e=>renderHome(e.target.value));
searchDiv.appendChild(inp);
app.appendChild(searchDiv);
// List grouped by category
const list=h('div',{class:'list'});
if(filtered.length===0){
list.appendChild(h('div',{class:'empty'},'No se encontraron resultados para "'+filter+'"'));
} else if(fl){
filtered.forEach(p=>{
const card=h('div',{class:'proto-card',onclick:()=>{openSections={};renderDetail(p);}},
h('div',{class:'proto-icon',style:{backgroundColor:p.color+'18'}},h('span',null,p.icon)),
h('div',null,h('div',{class:'title'},p.title),h('div',{class:'sub'},p.subtitle)),
h('span',{class:'arrow'},'→')
);
list.appendChild(card);
});
} else {
categories.forEach(cat=>{
const catProtos=filtered.filter(p=>p.cat===cat.id);
if(catProtos.length===0)return;
const catH=h('div',{class:'cat-header'},
h('span',{class:'cat-icon'},cat.icon),
h('span',{class:'cat-label'},cat.label)
);
list.appendChild(catH);
catProtos.forEach(p=>{
const card=h('div',{class:'proto-card',onclick:()=>{openSections={};renderDetail(p);}},
h('div',{class:'proto-icon',style:{backgroundColor:p.color+'18'}},h('span',null,p.icon)),
h('div',null,h('div',{class:'title'},p.title),h('div',{class:'sub'},p.subtitle)),
h('span',{class:'arrow'},'→')
);
list.appendChild(card);
});
});
}
app.appendChild(list);
// Footer
app.appendChild(h('div',{class:'footer'},'Servicio de Medicina Interna'));
// Refocus search
if(filter){const i=app.querySelector('.search input');if(i){i.focus();i.setSelectionRange(filter.length,filter.length);}}
}

function renderDetail(p){
app.innerHTML='';
// Header
const hdr=h('div',{class:'detail-header',style:{background:'linear-gradient(135deg,'+p.color+','+p.color+'dd)'}},
h('button',{class:'back-btn',onclick:()=>{openSections={};renderHome();}},'← Volver'),
h('div',{class:'icon'},p.icon),
h('h1',null,p.title),
h('p',null,p.subtitle)
);
app.appendChild(hdr);
// Pinned sections
const pinnedSections=p.sections.filter(s=>s.pinned);
pinnedSections.forEach(s=>{
const banner=h('div',{class:'pinned-banner'});
banner.appendChild(h('div',{class:'pinned-title'},h('span',null,s.icon),h('span',null,s.title)));
if(s.items&&s.items.length){s.items.forEach(it=>{const d=h('div',{class:'pinned-item'});d.appendChild(h('div',{class:'pinned-item-label'},it.l));d.appendChild(h('div',{class:'pinned-item-value'},it.v));banner.appendChild(d);});}
if(s.notes){s.notes.forEach(n=>{banner.appendChild(h('div',{class:'pinned-note'},n));});}
app.appendChild(banner);
});
// Sections
const cont=h('div',{class:'sections'});
p.sections.filter(s=>!s.pinned).forEach((s,si)=>{
const sec=h('div',{class:'section'});
const key=p.id+'_'+si;
const isOpen=!!openSections[key];
// Head
const head=h('div',{class:'section-head'+(isOpen?' open':''),onclick:()=>{
openSections[key]=!openSections[key];renderDetail(p);
}});
const left=h('div',{class:'left'},
h('span',{class:'ico'},s.icon),
h('span',{class:'ttl'},s.title)
);
if(s.tag){
const tg=h('span',{class:'tag',style:{backgroundColor:s.tagC}},s.tag);
left.appendChild(tg);
}
head.appendChild(left);
head.appendChild(h('span',{class:'chevron'+(isOpen?' open':'')},'▼'));
sec.appendChild(head);
// Body
if(isOpen){
const body=h('div',{class:'section-body'});
if(s.type==='rockwood'&&s.rockwood){
const rw=h('div',{class:'rockwood-scale'});
s.rockwood.forEach((r,ri)=>{
if(ri===4){
rw.appendChild(h('div',{class:'rw-cutoff'},'⚠ Valor ≥ 5 → Ingreso en GERIATRÍA'));
}
const row=h('div',{class:'rw-row'});
row.appendChild(h('div',{class:'rw-num',style:{backgroundColor:r.c}},String(r.n)));
row.appendChild(h('div',{class:'rw-bar',style:{backgroundColor:r.c}}));
const info=h('div',{class:'rw-info'});
info.appendChild(h('div',{class:'rw-name',style:{color:r.c}},r.name));
info.appendChild(h('div',{class:'rw-desc'},r.desc));
row.appendChild(info);
const meter=h('div',{class:'rw-meter'});
meter.appendChild(h('div',{class:'rw-meter-fill',style:{width:r.auto+'%',backgroundColor:r.c}}));
row.appendChild(meter);
rw.appendChild(row);
});
const legend=h('div',{class:'rw-legend'});
legend.innerHTML='<span>📋 1-3: No frágil</span><span>⚡ 4: Vulnerable</span><span>🔶 5-8: Frágil → Geriatría</span><span>🏥 9: Terminal</span>';
rw.appendChild(legend);
body.appendChild(rw);
}
if(s.items&&s.items.length>0){
s.items.forEach(it=>{
const row=h('div',{class:'item-row'},
h('div',{class:'lbl'},it.l),
h('div',{class:'val'},it.v+(it.n?'<br><span class="note">'+it.n+'</span>':''))
);
row.querySelector('.val').innerHTML=it.v+(it.n?'<br><span class="note">'+it.n+'</span>':'');
body.appendChild(row);
});
}
if(s.subs){
s.subs.forEach(sub=>{
body.appendChild(h('div',{class:'sub-title'},sub.title));
sub.items.forEach(it=>{
const row=h('div',{class:'item-row'});
if(it.l)row.appendChild(h('div',{class:'lbl'},it.l));
const valDiv=h('div',{class:'val',style:it.l?{}:{textAlign:'left',maxWidth:'100%'}});
valDiv.innerHTML=it.v;
row.appendChild(valDiv);
body.appendChild(row);
});
});
}
if(s.notes){
s.notes.forEach(n=>{
body.appendChild(h('div',{class:'note-box'},n));
});
}
sec.appendChild(body);
}
cont.appendChild(sec);
});
app.appendChild(cont);
// Footer
app.appendChild(h('div',{class:'footer'},'Servicio de Medicina Interna'));
}

// Init
renderHome();
</script>
</body>
</html>
